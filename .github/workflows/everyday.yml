name: Check the page content

on:
  schedule:
    - cron: '0 12 * * *'   # UTC 12:00
  workflow_dispatch:
  push:
  
permissions:
  contents: write

jobs:
  check_page:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Python + Playwright
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y tree
          pip install playwright          
          playwright install
          pip install -r requirements.txt
          pwd
          ls

      # 3️⃣ 抓网页
      - name: Run Playwright script
        run: |
          python fetch.py

      # 4️⃣ 确保目录存在
      - name: Ensure source dir
        run: mkdir -p source

      # 5️⃣ 对比
      - name: Compare with old file
        id: compare
        run: |
          if [ -f source/kamept.txt ]; then
            if cmp -s page.txt source/kamept.txt; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

          echo "File changed? ${{ steps.compare.outputs.changed }}"

      # 6️⃣ 记录日志（核心）
      - name: Write log
        run: |
          DATE=$(date -u "+%Y-%m-%d %H:%M:%S")
          RESULT="${{ steps.compare.outputs.changed }}"
          echo "$DATE | changed=$RESULT" >> source/info.txt
          python wechat.py --kamept "$RESULT"

      # 7️⃣ 提交日志（无论是否变化都提交）
      - name: Commit log
        run: |
          git config --global user.name "shiye"
          git config --global user.email "shiye@zju.edu.cn"
          git add source/info.txt
          git commit -m "Update info.txt"
          git push
